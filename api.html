            <li><a href="index.html">Home</a></li>
        </ul>
        </nav>
    </header>

<div class="container">
  <h1>Brain Gains Trivia</h1>

  <div id="setup">
    <label>Questions:
      <select id="amount">
        <option value="5">5</option>
        <option value="10">10</option>
      </select>
    </label>

    <label>Difficulty:
      <select id="difficulty">
        <option value="">Any</option>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
    </label>

    <br><br>
    <button id="start-button">Start Game</button>
    <button id="view-button">View Favorites</button>
    <button id="playFavorites-button">Play Favorites Trivia</button>
    <button id="playMissedTrivia-button">Play Missed Trivia</button>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <h3 id="question"></h3>
    <div id="answers" class="answers"></div>
    <div id="feedback"></div>
    <div id="score"></div>
  </div>

  <!-- END -->
  <div id="end" class="hidden"></div>

</div>

<footer>
        <ul class="footerNav">
            <li><a class="footerA" href="api.html">Play</a></li>
            <li><a class="footerA" href="vault.html">Vault</a></li>
            <li><a class="footerA pref-link" href="preferences.html">Preferences</a></li>
            <script>
            // Carry over URL params to preferences.html links
            document.addEventListener('DOMContentLoaded', function() {
              const params = window.location.search;
              document.querySelectorAll('a.pref-link').forEach(link => {
                link.addEventListener('click', function(e) {
                  if (params && params.length > 1) {
                    e.preventDefault();
                    const url = new URL(link.href, window.location.origin);
                    url.search = params;
                    window.location.href = url.toString();
                  }
                });
              });
            });
            </script>
            <li><a class="footerA" href="index.html">Home</a></li>
        </ul>
